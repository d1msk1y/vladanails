name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish deployment URLs
        if: success()
        run: |
          {
            echo "### Cloudflare Pages deployment"
            echo ""
            echo "- Deployment URL: ${{ steps.deploy.outputs.deployment-url }}"
            echo "- Branch alias URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}"
          } >> "$GITHUB_STEP_SUMMARY"